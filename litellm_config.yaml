general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  alerting: []

router_settings:
  routing_strategy: latency-based-routing
  num_retries: 3
  cooldown_time: 60
  retry_after: 5
  allowed_fails: 2
  enable_pre_call_checks: true
  optional_pre_call_checks:
    - enforce_model_rate_limits

litellm_settings:
  num_retries: 3
  request_timeout: 30
  fallbacks:
  - nvidia-coding:
    - nvidia-reasoning
    - nvidia-general
  - nvidia-reasoning:
    - nvidia-general
    - nvidia-coding
  - nvidia-general:
    - nvidia-fast
    - nvidia-reasoning
  - nvidia-fast:
    - nvidia-general
  set_verbose: false
  drop_params: true
